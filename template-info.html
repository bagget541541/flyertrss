<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Instrument+Sans:wght@400;500;600;700;800&display=swap');

body {
  width: {w}px; height: {h}px;
  font-family: "Instrument Sans","PingFang SC","Microsoft YaHei",sans-serif;
  background: #fff;
  display:flex; flex-direction:row; overflow:hidden;
  position:relative;
}

/* 顶部色带 — 更窄 */
.header-band {
  flex-shrink:0;
  background:#fff; border-bottom:1px solid #e5e7eb;
  padding:18px 32px 14px;
  position:relative;
}
.header-band .brand {
  font-family:"Noto Serif SC",serif;
  font-size:16px; font-weight:900; color:#0f172a;
}
.header-band .brand span { color:#2563eb; }
/* 内容区 — 紧凑填充 */
.content {
  flex:1; display:flex; flex-direction:column;
  padding:24px 28px 12px;
  overflow-y:auto;
  position:relative;
}

/* 主标题区 */
.title-area {
  flex-shrink:0;
}
.title-area .bank-badge {
  display:inline-flex; align-items:center; gap:8px;
  margin-bottom:8px;
}
.title-area .bank-badge .bank-logo {
  width:32px; height:32px;
  border-radius:6px;
  object-fit:contain;
  flex-shrink:0;
}
.title-area .bank-badge .bank-name {
  font-size:13px; font-weight:600;
  color:#64748b;
  letter-spacing:0.3px;
}
.title-area .main-title {
  font-family:"Noto Serif SC",serif;
  font-size:36px; font-weight:800;
  line-height:1.3;
  color:#0f172a;
  margin-bottom:8px;
}
.title-area .sub-title {
  font-size:14px; color:#64748b;
  display:flex; align-items:center; gap:14px;
  flex-wrap:wrap;
}
.title-area .sub-title .replies {
  font-weight:700; color:{accent};
}

/* 分隔线 */
.divider {
  flex-shrink:0;
  margin:16px 0;
  width:48px; height:3px;
  background:{accent}; opacity:0.25;
  border-radius:2px;
}

/* 社区热评区 */
.reviews-section {
  flex:1;
  display:flex; flex-direction:column;
  min-height:0;
}
.reviews-section .section-label {
  font-size:11px; font-weight:700;
  color:#64748b; letter-spacing:0.5px;
  margin-bottom:10px;
  text-transform:uppercase;
}
.reviews-section .section-label::before { content:"💬 "; }
.reviews-section .hr-item {
  display:flex; gap:8px;
  padding:8px 12px;
  margin-bottom:10px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-left:3px solid {accent};
  border-radius:6px;
  font-size:14px; line-height:1.6;
}
.reviews-section .hr-text { color:#334155; }
.reviews-section .hr-empty {
  flex:1; display:flex; align-items:center; justify-content:center;
  font-size:13px; color:#94a3b8;
}

/* 数据亮点卡 — 热评为空时展示 */
.reviews-section .data-highlights {
  display:flex; flex-direction:row; gap:6px;
}
.reviews-section .dh-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-left:3px solid {accent};
  border-radius:6px;
  font-size:13px; line-height:1.5;
}
.reviews-section .dh-icon { font-size:16px; flex-shrink:0; }
.reviews-section .dh-label { color:#64748b; }
.reviews-section .dh-value { font-weight:700; color:#0f172a; }

/* 编辑总结区 */
.summary-area {
  flex-shrink:0;
  margin-top:8px;
  padding:14px 16px;
  background:linear-gradient(135deg, {bg_color} 0%, #fff 100%);
  border:1px solid {accent_light};
  border-radius:8px;
}
.summary-area .s-label {
  font-size:11px; font-weight:700;
  color:#64748b; letter-spacing:0.5px;
  margin-bottom:6px;
}
.summary-area .s-label::before { content:"📝 "; }
.summary-area .s-body {
  font-size:14px; font-weight:600;
  color:#0f172a; line-height:1.5;
}
.summary-area .s-footnote {
  font-size:14px; color:#64748b;
  margin-top:4px; line-height:1.4;
}

/* 底部 CTA */
.footer {
  flex-shrink:0; text-align:center;
  padding:14px 0 20px;
  background:linear-gradient(0deg,{footer_bg},transparent);
}
.footer .cta {
  font-size:12px; color:#6366f1; font-weight:600;
}

.main {
  flex: 1;
  display: flex; flex-direction: column;
  min-width: 0; overflow: hidden;
  background: inherit;
}

.sidebar {
  width: 25%;
  flex-shrink: 0;
  background: #0046C8;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 36px 16px 28px;
}
.sidebar .sidebar-top {
  text-align: center;
}
.sidebar .sidebar-top .follow-label {
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.85);
  letter-spacing: 1px;
  margin-bottom: 14px;
}
.sidebar .qr-wrap {
  width: 110px; height: 110px;
  background: #fff;
  border-radius: 6px;
  padding: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.sidebar .qr-wrap img {
  width: 100%; height: 100%;
  object-fit: contain;
  border-radius: 3px;
}
.sidebar .divider {
  width: 48px; height: 1px;
  background: rgba(255,255,255,0.25);
  margin: 10px 0;
}
.sidebar .stats-bar {
  display: flex; flex-direction: column;
  align-items: center; gap: 22px;
}
.sidebar .stats-bar .stat-block {
  text-align: center;
}
.sidebar .stats-bar .stat-block .stat-num {
  font-size: 32px; font-weight: 800;
  color: #fff;
  line-height: 1.1;
  font-family: "Inter Tight", sans-serif;
}
.sidebar .stats-bar .stat-block .stat-label {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.85);
  margin-top: 4px;
}
.sidebar .copyright {
  font-size: 10px; color: rgba(255,255,255,0.5);
  text-align: center; line-height: 1.7;
}
</style>
</head>
<body>

<div class="main">
  <div class="header-band">
  <div class="brand">飞客<span>信用卡</span>日报</div>
</div>

<div class="content">
  <!-- 主标题 -->
  <div class="title-area">
    <div class="bank-badge">
      <img class="bank-logo" src="{bank_logo}" alt="{bank}">
      <span class="bank-name">{bank}</span>
    </div>
    <div class="main-title">{summary}</div>
    <div class="sub-title">
      <span class="replies">{replies} 条回复</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 社区热评区 -->
  <div class="reviews-section">
    <div class="section-label">社区热评</div>
    {hot_replies_placeholder}
  </div>

  <!-- 编辑点评 -->
  <div class="summary-area">
    <div class="s-label">编辑点评</div>
    <div class="s-body">{editor_summary}</div>
    <div class="s-footnote">{editor_footnote}</div>
  </div>
</div>

<div class="footer">
  <div class="cta">关注 {branding} 每日获取信用卡情报</div>
</div>
</div>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="follow-label">关注公众号</div>
    <div class="qr-wrap"><img src="{qr_path}" alt="二维码"></div>
  </div>
  <div class="divider"></div>
  <div class="stats-bar">
    <div class="stat-block"><div class="stat-num">{total}</div><div class="stat-label">总条数</div></div>
    <div class="stat-block"><div class="stat-num">{bank_count}</div><div class="stat-label">家银行</div></div>
    <div class="stat-block"><div class="stat-num">{top_replies}</div><div class="stat-label">最热回复</div></div>
  </div>
  <div class="divider"></div>
  <div class="copyright">{branding}<br>{ds}</div>
</div>

<script>
// 当热评为空时，显示占位
(function(){{
  var hr = document.querySelector('.reviews-section');
  var items = hr.querySelectorAll('.hr-item');
  if (items.length === 0) {{
    hr.innerHTML = hr.innerHTML + '<div class="hr-empty">暂无高赞评论</div>';
  }}
}})();
</script>
</body>
</html>
