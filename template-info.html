<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Instrument+Sans:wght@400;500;600;700;800&display=swap');

body {
  width: {w}px; height: {h}px;
  font-family: "Instrument Sans","PingFang SC","Microsoft YaHei",sans-serif;
  background: {bg_color};
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
}

/* 顶部色带 — 更窄 */
.header-band {
  flex-shrink:0;
  background:{header_grad};
  padding:18px 32px 14px;
  position:relative;
}
.header-band .brand {
  font-family:"Noto Serif SC",serif;
  font-size:16px; font-weight:900; color:#fff;
}
.header-band .brand span { color:#fbbf24; }
/* 内容区 — 紧凑填充 */
.content {
  flex:1; display:flex; flex-direction:column;
  padding:24px 28px 12px;
  position:relative;
}

/* 主标题区 */
.title-area {
  flex-shrink:0;
}
.title-area .main-title {
  font-family:"Noto Serif SC",serif;
  font-size:36px; font-weight:800;
  line-height:1.3;
  color:#0f172a;
  margin-bottom:8px;
}
.title-area .sub-title {
  font-size:14px; color:#64748b;
  display:flex; align-items:center; gap:14px;
  flex-wrap:wrap;
}
.title-area .sub-title .replies {
  font-weight:700; color:{accent};
}

/* 分隔线 */
.divider {
  flex-shrink:0;
  margin:16px 0;
  width:48px; height:3px;
  background:{accent}; opacity:0.25;
  border-radius:2px;
}

/* 社区热评区 */
.reviews-section {
  flex:1;
  display:flex; flex-direction:column;
  min-height:0;
}
.reviews-section .section-label {
  font-size:11px; font-weight:700;
  color:#64748b; letter-spacing:0.5px;
  margin-bottom:10px;
  text-transform:uppercase;
}
.reviews-section .section-label::before { content:"💬 "; }
.reviews-section .hr-item {
  display:flex; gap:8px;
  padding:8px 12px;
  margin-bottom:6px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-left:3px solid {accent};
  border-radius:6px;
  font-size:13px; line-height:1.5;
}
.reviews-section .hr-text { color:#334155; }
.reviews-section .hr-empty {
  flex:1; display:flex; align-items:center; justify-content:center;
  font-size:13px; color:#94a3b8;
}

/* 数据亮点卡 — 热评为空时展示 */
.reviews-section .data-highlights {
  display:flex; flex-direction:column; gap:6px;
}
.reviews-section .dh-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-left:3px solid {accent};
  border-radius:6px;
  font-size:13px; line-height:1.5;
}
.reviews-section .dh-icon { font-size:16px; flex-shrink:0; }
.reviews-section .dh-label { color:#64748b; }
.reviews-section .dh-value { font-weight:700; color:#0f172a; }

/* 编辑总结区 */
.summary-area {
  flex-shrink:0;
  margin-top:8px;
  padding:14px 16px;
  background:linear-gradient(135deg, {bg_color} 0%, #fff 100%);
  border:1px solid {accent_light};
  border-radius:8px;
}
.summary-area .s-label {
  font-size:11px; font-weight:700;
  color:#64748b; letter-spacing:0.5px;
  margin-bottom:6px;
}
.summary-area .s-label::before { content:"📝 "; }
.summary-area .s-body {
  font-size:14px; font-weight:600;
  color:#0f172a; line-height:1.5;
}
.summary-area .s-footnote {
  font-size:12px; color:#64748b;
  margin-top:4px; line-height:1.4;
}

/* 底部 CTA */
.footer {
  flex-shrink:0; text-align:center;
  padding:14px 0 20px;
  background:linear-gradient(0deg,{footer_bg},transparent);
}
.footer .cta {
  font-size:12px; color:#6366f1; font-weight:600;
}
</style>
</head>
<body>

<div class="header-band">
  <div class="brand">飞客<span>信用卡</span>日报</div>
</div>

<div class="content">
  <!-- 主标题 -->
  <div class="title-area">
    <div class="main-title">{summary}</div>
    <div class="sub-title">
      <span class="replies">{replies} 条回复</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 社区热评区 -->
  <div class="reviews-section">
    <div class="section-label">社区热评</div>
    {hot_replies_placeholder}
  </div>

  <!-- 编辑点评 -->
  <div class="summary-area">
    <div class="s-label">编辑点评</div>
    <div class="s-body">{editor_summary}</div>
    <div class="s-footnote">{editor_footnote}</div>
  </div>
</div>

<div class="footer">
  <div class="cta">关注 {branding} 每日获取信用卡情报</div>
</div>

<script>
// 当热评为空时，显示占位
(function(){{
  var hr = document.querySelector('.reviews-section');
  var items = hr.querySelectorAll('.hr-item');
  if (items.length === 0) {{
    hr.innerHTML = hr.innerHTML + '<div class="hr-empty">暂无高赞评论</div>';
  }}
}})();
</script>
</body>
</html>
