<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Inter+Tight:wght@400;500;600;700&display=swap');
body {
  width: {w}px; height: {h}px;
  font-family: "Inter Tight","PingFang SC","Microsoft YaHei",sans-serif;
  background: #fff;
  display: flex; flex-direction: row;
  overflow: hidden;
}

.main {
  flex: 1;
  display: flex; flex-direction: column;
  min-width: 0;
  background: #fff;
}

.header {
  flex-shrink: 0;
  padding: 28px 24px 20px;
  border-bottom: 1px solid #E5E5E5;
}
.header h1 {
  font-family: "Noto Serif SC", serif;
  font-size: 32px; font-weight: 700;
  color: #333333;
}
.header h1 span { color: {accent}; }
.header .sub {
  display: flex; align-items: center; gap: 8px;
  margin-top: 6px; font-size: 14px; color: #666666;
  font-weight: 400;
}

.stats {
  flex-shrink: 0;
  display: flex; justify-content: space-around;
  padding: 16px 20px;
  border-bottom: 1px solid #E5E5E5;
}
.stat-item { text-align: center; }
.stat-item .num { font-size: 18px; font-weight: 700; color: {accent}; }
.stat-item .lab { font-size: 12px; color: #666666; margin-top: 2px; }

.hook {
  flex-shrink: 0;
  padding: 12px 24px;
  font-size: 14px; color: #666666; font-weight: 400;
  border-bottom: 1px solid #E5E5E5;
}

.content {
  flex: 1;
  padding: 0 24px;
  overflow-y: auto;
}

.post {
  padding: 24px 0;
  border-bottom: 1px solid #E5E5E5;
  position: relative;
}
.post:last-child { border-bottom: none; }

.post .title {
  font-size: 20px; font-weight: 500; color: #333333;
  line-height: 1.5; margin-bottom: 8px; padding-right: 60px;
}
.post .tag {
  position: absolute; top: 24px; right: 0;
  font-size: 12px; font-weight: 600; color: {accent};
  background: {bar}; padding: 2px 10px;
  max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.post .meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 14px; color: #666666;
  font-weight: 400;
}
.post .meta .replies { color: {accent}; font-weight: 600; }
.post .heat-track {
  flex: 1; height: 3px; background: #E5E5E5;
  max-width: 80px; overflow: hidden;
}
.post .heat-fill {
  height: 100%; background: {accent};
}

.hot-title::before {
  content: "HOT "; font-size: 10px; font-weight: 800;
  color: #fff; background: #dc2626;
  padding: 1px 6px; border-radius: 2px; margin-right: 10px;
}

.compact .post { padding: 20px 0; }
.compact .post .title { padding-right: 50px; }

.footer {
  flex-shrink: 0;
  padding: 20px 24px;
  border-top: 1px solid #E5E5E5;
}
.footer .sect {
  font-size: 14px; font-weight: 500; color: {accent};
}
.footer .cta {
  font-size: 12px; color: #666666; font-weight: 400; margin-top: 4px;
}

.sidebar {
  width: 25%;
  flex-shrink: 0;
  background: #0046C8;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 36px 16px 28px;
}
.sidebar .sidebar-top {
  text-align: center;
}
.sidebar .sidebar-top .follow-label {
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.85);
  letter-spacing: 1px;
  margin-bottom: 14px;
}
.sidebar .qr-wrap {
  width: 110px; height: 110px;
  background: #fff;
  border-radius: 6px;
  padding: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.sidebar .qr-wrap img {
  width: 100%; height: 100%;
  object-fit: contain;
  border-radius: 3px;
}
.sidebar .divider {
  width: 48px; height: 1px;
  background: rgba(255,255,255,0.25);
}
.sidebar .stats-bar {
  display: flex; flex-direction: column;
  align-items: center; gap: 22px;
}
.sidebar .stats-bar .stat-block {
  text-align: center;
}
.sidebar .stats-bar .stat-block .stat-num {
  font-size: 32px; font-weight: 800;
  color: #fff;
  line-height: 1.1;
  font-family: "Inter Tight", sans-serif;
}
.sidebar .stats-bar .stat-block .stat-label {
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.85);
  margin-top: 2px;
}
.sidebar .copyright {
  font-size: 10px; color: rgba(255,255,255,0.5);
  text-align: center; line-height: 1.7;
}
</style>
</head>
<body>
<div class="main">
  <div class="header">
    <h1>飞客<span>信用卡</span>日报</h1>
    <div class="sub"><span>{ds}</span><span>|</span><span>{bank_count} 家银行 · {total} 条</span></div>
  </div>
  <div class="stats">
    <div class="stat-item"><div class="num">{top_replies}</div><div class="lab">最热帖</div></div>
    <div class="stat-item"><div class="num">{bank_count}</div><div class="lab">有动静</div></div>
    <div class="stat-item"><div class="num">{hot_bank}</div><div class="lab">讨论最多</div></div>
  </div>
  <div class="hook">{hook}</div>
  <div class="content{extra_cls}">{posts_html}</div>
  <div class="footer">
    <div class="sect">{section}</div>
    <div class="cta">关注 {branding} 每日获取信用卡情报</div>
  </div>
</div>
<div class="sidebar">
  <div class="sidebar-top">
    <div class="follow-label">关注公众号</div>
    <div class="qr-wrap"><img src="{qr_path}" alt="二维码"></div>
  </div>
  <div class="divider"></div>
  <div class="stats-bar">
    <div class="stat-block"><div class="stat-num">{total}</div><div class="stat-label">总条数</div></div>
    <div class="stat-block"><div class="stat-num">{bank_count}</div><div class="stat-label">家银行</div></div>
    <div class="stat-block"><div class="stat-num">{top_replies}</div><div class="stat-label">最热回复</div></div>
  </div>
  <div class="divider"></div>
  <div class="copyright">{branding}<br>{ds}</div>
</div>
</body>
</html>
